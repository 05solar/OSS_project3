server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:${AUTH_DB_PATH:/data/auth.db}
    driver-class-name: org.sqlite.JDBC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt-secret: ${JWT_SECRET:change-me}
  access-token-minutes: 120
  refresh-token-days: 7

