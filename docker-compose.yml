services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/auth-service
    environment:
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DB_PATH: /data/auth.db
    volumes:
      - ./data/auth:/data
    depends_on:
      - redis
    ports:
      - "8081:8081"

  menu-service:
    build: ./services/menu-service
    environment:
      MENU_DB_PATH: /data/menu.db
    volumes:
      - ./data/menu:/data
    ports:
      - "8082:8082"

  order-service:
    build: ./services/order-service
    environment:
      ORDER_DB_PATH: /data/order.db
    volumes:
      - ./data/order:/data
    ports:
      - "8083:8083"

  review-service:
    build: ./services/review-service
    environment:
      REVIEW_DB_PATH: /data/review.db
    volumes:
      - ./data/review:/data
    ports:
      - "8084:8084"

  ai-recommendation-service:
    build: ./ai-services/recommendation-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    ports:
      - "8001:8000"

  ai-review-writer-service:
    build: ./ai-services/review-writer-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    ports:
      - "8002:8000"

  ai-operations-service:
    build: ./ai-services/operations-ai-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    ports:
      - "8003:8000"

  gateway-service:
    build: ./services/gateway-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_BASE_URL: http://auth-service:8081
      MENU_BASE_URL: http://menu-service:8082
      ORDER_BASE_URL: http://order-service:8083
      REVIEW_BASE_URL: http://review-service:8084
      AI_RECOMMENDATION_BASE_URL: http://ai-recommendation-service:8000
      AI_REVIEW_WRITER_BASE_URL: http://ai-review-writer-service:8000
      AI_OPERATIONS_BASE_URL: http://ai-operations-service:8000
    depends_on:
      - auth-service
      - menu-service
      - order-service
      - review-service
      - ai-recommendation-service
      - ai-review-writer-service
      - ai-operations-service
    ports:
      - "8080:8080"

  customer-web:
    build: ./customer-web
    depends_on:
      - gateway-service
    ports:
      - "5173:80"

  admin-web:
    build: ./admin-web
    depends_on:
      - gateway-service
    ports:
      - "5174:80"
